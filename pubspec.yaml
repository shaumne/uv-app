name: uv_dosimeter
description: "Dynamic UV Dosimeter Patch and AI Dermatologist"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # ── Local Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.5.3

  # ── Camera & Permissions ──────────────────────────────────────────────────
  camera: ^0.11.1
  permission_handler: ^11.4.0

  # ── Location ──────────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── UI & Design ───────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0

  # ── Localization ──────────────────────────────────────────────────────────
  intl: ^0.20.2

  # ── Monetization (Feature-Toggle-gated, dormant by default) ───────────────
  # SDK calls are fully implemented and gated by FeatureToggles flags.
  # Set FeatureToggles.isPremiumModeActive / areAdsEnabled = true to activate.
  purchases_flutter: ^8.1.2
  google_mobile_ads: ^5.3.0

  # ── Firebase (graceful degradation if google-services.json not present) ───
  firebase_core: ^3.13.0
  firebase_remote_config: ^5.4.0

  # ── Notifications ─────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Logging & Utilities ───────────────────────────────────────────────────
  logger: ^2.5.0
  flutter_native_splash: ^2.4.6
  package_info_plus: ^8.3.0
  equatable: ^2.0.7
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ───────────────────────────────────────────────────────────────
  flutter_lints: ^5.0.0
  very_good_analysis: ^7.0.0

  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4

  # ── Testing ───────────────────────────────────────────────────────────────
  mocktail: ^1.0.4
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
  generate: true

# ── Native Splash Screen ──────────────────────────────────────────────────────
# Run: dart run flutter_native_splash:create
# Bihaku aesthetic: warm clinical white background, brand color accent.
flutter_native_splash:
  color: "#F9F7F5"
  color_dark: "#1A1A2E"
  # image: assets/images/splash_logo.png  # uncomment once asset is added
  android_12:
    color: "#F9F7F5"
    color_dark: "#1A1A2E"
    # icon_background_color: "#F9F7F5"
  fullscreen: false
