name: uv_dosimeter
description: "Dynamic UV Dosimeter Patch and AI Dermatologist"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # ── Local Storage ─────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # ── Camera & Permissions ──────────────────────────────────────────────────
  camera: ^0.11.1
  permission_handler: ^11.4.0
  image: ^4.5.4

  # ── Location ──────────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── UI & Design ───────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  lottie: ^3.3.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # ── Localization ──────────────────────────────────────────────────────────
  intl: ^0.20.2

  # ── Monetization (Feature-Toggle-gated, dormant by default) ───────────────
  purchases_flutter: ^8.1.2
  google_mobile_ads: ^5.3.0

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_remote_config: ^5.4.0

  # ── Logging & Error ───────────────────────────────────────────────────────
  logger: ^2.5.0
  flutter_native_splash: ^2.4.6
  package_info_plus: ^8.3.0
  device_info_plus: ^11.4.0

  # ── Functional / Utils ────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ───────────────────────────────────────────────────────────────
  flutter_lints: ^5.0.0
  very_good_analysis: ^7.0.0

  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  # ── Testing ───────────────────────────────────────────────────────────────
  mocktail: ^1.0.4
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
  generate: true
